services:
  - type: web
    name: stcafe
    runtime: docker
    dockerfilePath: Dockerfile
    plan: free
    domains:
      - stcafe.chicvill.store
    envVars:
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        sync: false
        description: "Supabase PostgreSQL Connection URL"
      - key: GEMINI_API_KEY
        sync: false
        description: "Gemini API key for monthly summaries and admin chat"
      - key: MQTT_BROKER_HOST
        value: 315e5d948dad4a52b84916853d7e9344.s1.eu.hivemq.cloud
        description: "HiveMQ cloud host address"
      - key: MQTT_BROKER_PORT
        value: 8883
      - key: MQTT_USERNAME
        value: situation
      - key: MQTT_PASSWORD
        sync: false
      - key: NICEPAY_CLIENT_ID
        sync: false
        description: "NicePay Client ID"
      - key: NICEPAY_SECRET_KEY
        sync: false
        description: "NicePay Secret Key"
      - key: NICEPAY_API_URL
        value: https://api.nicepay.co.kr/v1

